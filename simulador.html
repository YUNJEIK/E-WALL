<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <meta name="description" content="Simulador de muro de publicaciones de E-WALL">
  <title>E-WALL | Simulador de Muro</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">
  
  <link rel="stylesheet" href="css/simulador.css" />
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg" aria-label="navegacion principal">
    <div class="nav-container container">
      <a href="index.html" class="logo navbar-brand">
        <img src="img/icono oscuro.jpg" alt="E-WALL logo">
      </a>

      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="nav-menu navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/events.html">Eventos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/wall.html">Wall</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="simulador.html" aria-current="page">Simulador</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/contact.html">Contacto</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<main>
  <div class="container-simulador">
    
    <!-- Sección del formulario -->
    <section class="form-section">
      <h1 class="section-title">Simulador de Muro - E-WALL</h1>
      <p class="subtitle">Prueba cómo funciona el muro de publicaciones en tiempo real</p>
      
      <h2 class="section-subtitle">Crear nueva publicación</h2>
      <form id="formPublicacion" class="form">
        <div class="form__group">
          <label for="titulo">Título</label>
          <input
            type="text"
            id="titulo"
            name="titulo"
            placeholder="Título de la publicación"
            required
          />
        </div>
        <div class="form__group">
          <label for="contenido">Contenido</label>
          <textarea
            id="contenido"
            name="contenido"
            rows="4"
            placeholder="Escribe el contenido aquí..."
            required
          ></textarea>
        </div>
        <div class="form__group">
          <label for="autor">Autor</label>
          <input
            type="text"
            id="autor"
            name="autor"
            placeholder="Tu nombre o alias"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">
          Publicar
        </button>
      </form>
    </section>

    <!-- Sección de controles -->
    <section class="controls">
      <h2 class="section-subtitle">Explorar publicaciones</h2>
      <div class="controls__row">
        <input
          type="text"
          id="buscador"
          class="controls__search"
          placeholder="Buscar por título..."
        />
        <button id="ordenarFecha" class="btn btn-secondary">
          Ordenar por fecha
        </button>
        <button id="ordenarLikes" class="btn btn-secondary">
          Ordenar por likes
        </button>
        <button id="mostrarDestacadas" class="btn btn-secondary">
          Mostrar solo destacadas
        </button>
      </div>
    </section>

    <!-- Sección de lista de publicaciones -->
    <section class="lista-section">
      <h2 class="section-subtitle">Muro de publicaciones</h2>
      <div id="listaPublicaciones" class="lista-publicaciones">
        <!-- JS inyecta tarjetas aquí -->
      </div>
    </section>

  </div>
</main>

<footer>
  <p>© 2026 E-WALL — Simulador educativo de muro de publicaciones</p>
</footer>

<!-- Librería externa SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Lógica del simulador -->
<script src="js/simulador.js"></script>
</body>
</html>
